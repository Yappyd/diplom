openapi: 3.0.3

info:
  title: Yappyd Chat Service API
  version: 1.0.0
  description: |
    API микросервиса chat-service.

    Сервис отвечает за:
      - создание приватных и групповых чатов;
      - получение списка чатов пользователя;
      - получение информации о конкретном чате;
      - управление участниками группового чата;
      - управление ролями и никнеймами участников.

    Аутентификация выполняется через JWT Bearer token.
    Идентификатор текущего пользователя извлекается из claim `sub`.

servers:
  - url: http://localhost:8083
    description: Local chat-service

security:
  - bearerAuth: []

tags:
  - name: Chats
    description: Operations with chats
  - name: Participants
    description: Operations with group chat participants

paths:
  /chats:
    get:
      tags:
        - Chats
      summary: Get current user's chats
      description: |
        Возвращает список чатов текущего пользователя.

        В список входят:
          - private-чаты, где текущий пользователь является одним из участников;
          - group-чаты, где текущий пользователь есть в chat_participants.
      operationId: getChats
      responses:
        '200':
          description: Chat list successfully returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chats/private:
    post:
      tags:
        - Chats
      summary: Create or get private chat
      description: |
        Создаёт приватный чат между текущим пользователем и targetUserId.

        Операция идемпотентна:
          - если приватный чат уже существует, возвращается существующий чат;
          - если не существует, создаётся новый.

        Между двумя пользователями может существовать только один private-chat.
      operationId: createPrivateChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrivateChatRequest'
            example:
              targetUserId: "11111111-1111-1111-1111-111111111111"
      responses:
        '200':
          description: Private chat returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chats/group:
    post:
      tags:
        - Chats
      summary: Create group chat
      description: |
        Создаёт новый групповой чат.

        Операция не является идемпотентной:
        каждый успешный запрос создаёт новый group-chat.

        Текущий пользователь автоматически добавляется в чат с ролью OWNER.
        participantIds может быть пустым массивом — в таком случае создаётся группа только с владельцем.
      operationId: createGroupChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupChatRequest'
            examples:
              ownerOnly:
                summary: Group chat with only owner
                value:
                  title: "Мой чат"
                  participantIds: []
              withParticipants:
                summary: Group chat with participants
                value:
                  title: "Диплом"
                  participantIds:
                    - "11111111-1111-1111-1111-111111111111"
                    - "22222222-2222-2222-2222-222222222222"
      responses:
        '200':
          description: Group chat successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chats/{chatId}:
    get:
      tags:
        - Chats
      summary: Get chat by id
      description: |
        Возвращает конкретный чат по chatId.

        Для private-chat доступ разрешён только двум участникам private-чата.
        Для group-chat доступ разрешён только участникам группы.
      operationId: getChat
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Chat successfully returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chats/{chatId}/participants:
    get:
      tags:
        - Participants
      summary: Get group chat participants
      description: |
        Возвращает список участников группового чата.

        Endpoint доступен только для GROUP-чатов.
        Текущий пользователь должен быть участником этого чата.
      operationId: getChatParticipants
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Participants successfully returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatParticipantsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Participants
      summary: Add participant to group chat
      description: |
        Добавляет пользователя в групповой чат с ролью MEMBER.

        Добавлять участников могут OWNER и ADMIN.
        Нельзя добавить пользователя, который уже является участником чата.

        Endpoint доступен только для GROUP-чатов.
      operationId: addParticipant
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddParticipantRequest'
            example:
              userId: "11111111-1111-1111-1111-111111111111"
      responses:
        '200':
          description: Participant successfully added; updated participant list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatParticipantsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chats/{chatId}/participants/{userId}:
    patch:
      tags:
        - Participants
      summary: Update group chat participant
      description: |
        Частично обновляет данные участника группового чата.

        Поддерживаемые поля:
          - role
          - nickname

        Семантика PATCH:
          - поле отсутствует в JSON — поле не изменяется;
          - nickname = null — nickname очищается;
          - nickname = string — nickname обновляется;
          - role = ADMIN или MEMBER — role обновляется при наличии прав.

        Правила изменения роли:
          - менять роли может только OWNER;
          - через этот endpoint нельзя назначить OWNER;
          - через этот endpoint нельзя изменить роль текущего OWNER;
          - допустимые значения для изменения: ADMIN, MEMBER.

        Правила изменения nickname:
          - OWNER может менять nickname всем;
          - ADMIN может менять nickname себе и MEMBER;
          - MEMBER может менять nickname только себе.

        Endpoint доступен только для GROUP-чатов.
      operationId: updateParticipant
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChatParticipantRequest'
            examples:
              updateRole:
                summary: Update role only
                value:
                  role: "ADMIN"
              updateNickname:
                summary: Update nickname only
                value:
                  nickname: "Саня"
              clearNickname:
                summary: Clear nickname
                value:
                  nickname: null
              updateBoth:
                summary: Update role and nickname
                value:
                  role: "ADMIN"
                  nickname: "Модератор"
      responses:
        '200':
          description: Participant successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatParticipantResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Participants
      summary: Remove participant from group chat
      description: |
        Удаляет участника из группового чата или позволяет пользователю выйти самому.

        Правила:
          - OWNER может удалить себя, ADMIN и MEMBER;
          - ADMIN может удалить себя и MEMBER;
          - MEMBER может удалить только себя.

        Если OWNER удаляет себя:
          - если он единственный участник чата, group-chat удаляется полностью;
          - если в чате есть другие участники, необходимо передать newOwnerId;
          - newOwnerId должен быть участником этого же чата;
          - newOwnerId может быть ADMIN или MEMBER.

        Поведение ответа:
          - если пользователь удаляет другого участника, возвращается 200 OK и обновлённый список участников;
          - если пользователь удаляет сам себя, возвращается 204 No Content.
      operationId: removeParticipant
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - $ref: '#/components/parameters/UserId'
        - name: newOwnerId
          in: query
          required: false
          description: |
            ID нового владельца.

            Обязателен только если OWNER удаляет сам себя,
            и в чате остаются другие участники.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Another participant removed; updated participant list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatParticipantsResponse'
        '204':
          description: Current user left the chat successfully; no response body returned
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ChatId:
      name: chatId
      in: path
      required: true
      description: Chat identifier
      schema:
        type: string
        format: uuid

    UserId:
      name: userId
      in: path
      required: true
      description: User identifier
      schema:
        type: string
        format: uuid

  schemas:
    ChatType:
      type: string
      enum:
        - PRIVATE
        - GROUP

    ParticipantRole:
      type: string
      enum:
        - OWNER
        - ADMIN
        - MEMBER

    CreatePrivateChatRequest:
      type: object
      required:
        - targetUserId
      additionalProperties: false
      properties:
        targetUserId:
          type: string
          format: uuid
          description: ID пользователя, с которым нужно создать или получить private-chat

    CreateGroupChatRequest:
      type: object
      required:
        - title
        - participantIds
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Group chat title
        participantIds:
          type: array
          description: |
            Initial group participant IDs.

            Может быть пустым массивом.
            Текущий пользователь автоматически добавляется как OWNER.
          items:
            type: string
            format: uuid
          example:
            - "11111111-1111-1111-1111-111111111111"

    AddParticipantRequest:
      type: object
      required:
        - userId
      additionalProperties: false
      properties:
        userId:
          type: string
          format: uuid
          description: ID пользователя, которого нужно добавить в group-chat

    UpdateChatParticipantRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      description: |
        PATCH request для обновления участника чата.

        Поля являются опциональными:
          - если поле отсутствует, оно не изменяется;
          - nickname: null очищает nickname;
          - role: null недопустим.
      properties:
        role:
          $ref: '#/components/schemas/ParticipantRole'
        nickname:
          type: string
          nullable: true
          maxLength: 255
          description: |
            Nickname участника в чате.

            Если поле отсутствует — nickname не изменяется.
            Если значение null — nickname очищается.
            Если строка пустая или состоит из пробелов, сервис нормализует nickname в null.

    ChatResponse:
      type: object
      required:
        - chatId
        - type
        - createdBy
        - createdAt
        - updatedAt
        - participantIds
      properties:
        chatId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ChatType'
        title:
          type: string
          nullable: true
          maxLength: 255
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        participantIds:
          type: array
          items:
            type: string
            format: uuid

    ChatListResponse:
      type: object
      required:
        - chats
      properties:
        chats:
          type: array
          items:
            $ref: '#/components/schemas/ChatResponse'

    ChatParticipantResponse:
      type: object
      required:
        - userId
        - role
        - joinedAt
        - updatedAt
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/ParticipantRole'
        nickname:
          type: string
          nullable: true
          maxLength: 255
        joinedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ChatParticipantsResponse:
      type: object
      required:
        - participants
      properties:
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ChatParticipantResponse'

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - status
        - path
        - timestamp
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - INVALID_CHAT
            - INVALID_PRIVATE_CHAT
            - INVALID_CHAT_PARTICIPANT
            - PRIVATE_CHAT_WITH_SELF
            - PRIVATE_CHAT_TITLE_UPDATE_NOT_ALLOWED
            - CHAT_NOT_FOUND
            - CHAT_ACCESS_DENIED
            - PARTICIPANT_ALREADY_EXISTS
            - PARTICIPANT_NOT_FOUND
            - NEW_OWNER_REQUIRED
            - INVALID_NEW_OWNER
            - VALIDATION_ERROR
            - INVALID_REQUEST_BODY
            - INVALID_REQUEST_PARAMETER
            - DATA_INTEGRITY_VIOLATION
            - INTERNAL_ERROR
        message:
          type: string
          description: Human-readable error message
        status:
          type: integer
          format: int32
          description: HTTP status code
        path:
          type: string
          description: Request path
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              summary: Validation error
              value:
                code: "VALIDATION_ERROR"
                message: "Request validation failed"
                status: 400
                path: "/chats/group"
                timestamp: "2026-05-13T15:00:00Z"
            invalidBody:
              summary: Invalid request body
              value:
                code: "INVALID_REQUEST_BODY"
                message: "Invalid request body"
                status: 400
                path: "/chats/00000000-0000-0000-0000-000000000000/participants"
                timestamp: "2026-05-13T15:00:00Z"

    Unauthorized:
      description: Missing, invalid or expired JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "UNAUTHORIZED"
            message: "Unauthorized"
            status: 401
            path: "/chats"
            timestamp: "2026-05-13T15:00:00Z"

    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "CHAT_ACCESS_DENIED"
            message: "Access denied to chat: 00000000-0000-0000-0000-000000000000"
            status: 403
            path: "/chats/00000000-0000-0000-0000-000000000000"
            timestamp: "2026-05-13T15:00:00Z"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            chatNotFound:
              summary: Chat not found
              value:
                code: "CHAT_NOT_FOUND"
                message: "Chat not found: 00000000-0000-0000-0000-000000000000"
                status: 404
                path: "/chats/00000000-0000-0000-0000-000000000000"
                timestamp: "2026-05-13T15:00:00Z"
            participantNotFound:
              summary: Participant not found
              value:
                code: "PARTICIPANT_NOT_FOUND"
                message: "User 11111111-1111-1111-1111-111111111111 is not participant of chat 00000000-0000-0000-0000-000000000000"
                status: 404
                path: "/chats/00000000-0000-0000-0000-000000000000/participants/11111111-1111-1111-1111-111111111111"
                timestamp: "2026-05-13T15:00:00Z"

    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            participantAlreadyExists:
              summary: Participant already exists
              value:
                code: "PARTICIPANT_ALREADY_EXISTS"
                message: "User 11111111-1111-1111-1111-111111111111 is already participant of chat 00000000-0000-0000-0000-000000000000"
                status: 409
                path: "/chats/00000000-0000-0000-0000-000000000000/participants"
                timestamp: "2026-05-13T15:00:00Z"
            dataIntegrityViolation:
              summary: Data integrity violation
              value:
                code: "DATA_INTEGRITY_VIOLATION"
                message: "Data integrity violation"
                status: 409
                path: "/chats/private"
                timestamp: "2026-05-13T15:00:00Z"

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: "INTERNAL_ERROR"
            message: "Unexpected server error"
            status: 500
            path: "/chats"
            timestamp: "2026-05-13T15:00:00Z"