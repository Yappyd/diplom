openapi: 3.0.3

info:
  title: Message Service API
  version: 1.0.0
  description: |
    API сервиса сообщений для веб-приложения мессенджера.

    Текущее состояние сервиса:
      - создание сообщений;
      - получение сообщения по идентификатору;
      - получение истории сообщений чата;
      - редактирование собственных сообщений;
      - мягкое удаление собственных сообщений.

    Сервис не отвечает за:
      - управление чатами;
      - управление участниками чатов;
      - хранение профилей пользователей;
      - real-time доставку сообщений по WebSocket.

    На текущем этапе проверка принадлежности пользователя к чату ещё не реализована.
    В коде оставлены TODO для будущей проверки через локальную read-model,
    синхронизируемую событиями RabbitMQ от chat-service.

servers:
  - url: http://localhost:8084
    description: Local message-service
  - url: http://localhost:8080
    description: API Gateway

tags:
  - name: Messages
    description: Операции с сообщениями

paths:
  /messages:
    post:
      tags:
        - Messages
      summary: Отправить сообщение
      description: |
        Создаёт новое сообщение в указанном чате.

        Идентификатор отправителя не передаётся в теле запроса.
        Он извлекается из JWT access token из claim `sub`.

        В текущей реализации сервис не проверяет существование чата
        и участие пользователя в чате. Эта проверка будет добавлена позже.
      operationId: sendMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            example:
              chatId: "11111111-1111-1111-1111-111111111111"
              content: "Привет из message-service"
      responses:
        '201':
          description: Сообщение успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                messageId: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                chatId: "11111111-1111-1111-1111-111111111111"
                senderId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                content: "Привет из message-service"
                createdAt: "2026-05-14T18:30:00Z"
                updatedAt: null
                deletedAt: null
                edited: false
                deleted: false

        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Ошибка валидации тела запроса
                  value:
                    code: "VALIDATION_ERROR"
                    message: "content: must not be blank"
                    status: 400
                    path: "/messages"
                    timestamp: "2026-05-14T18:30:00Z"
                invalidRequestBody:
                  summary: Некорректное JSON-тело запроса
                  value:
                    code: "INVALID_REQUEST_BODY"
                    message: "Invalid request body"
                    status: 400
                    path: "/messages"
                    timestamp: "2026-05-14T18:30:00Z"
                invalidMessage:
                  summary: Некорректное сообщение
                  value:
                    code: "INVALID_MESSAGE"
                    message: "Message content must not be blank"
                    status: 400
                    path: "/messages"
                    timestamp: "2026-05-14T18:30:00Z"

        '401':
          description: Пользователь не аутентифицирован или JWT некорректен

        '409':
          description: Нарушение ограничений целостности данных
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "DATA_INTEGRITY_VIOLATION"
                message: "Data integrity violation"
                status: 409
                path: "/messages"
                timestamp: "2026-05-14T18:30:00Z"

        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Messages
      summary: Получить историю сообщений чата
      description: |
        Возвращает список сообщений указанного чата.

        Для получения истории используется cursor-пагинация.
        Параметр `before` позволяет получить сообщения, созданные раньше
        указанного момента времени.

        Если `before` не передан, возвращаются последние сообщения чата.

        В текущей реализации сервис не проверяет, является ли пользователь
        участником указанного чата. Эта проверка будет добавлена позже.
      operationId: getMessagesByChat
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: query
          required: true
          description: Идентификатор чата
          schema:
            type: string
            format: uuid
          example: "11111111-1111-1111-1111-111111111111"

        - name: before
          in: query
          required: false
          description: Вернуть сообщения, созданные раньше указанного времени
          schema:
            type: string
            format: date-time
          example: "2026-05-14T18:30:00Z"

        - name: limit
          in: query
          required: false
          description: Максимальное количество сообщений
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          example: 50

      responses:
        '200':
          description: История сообщений успешно получена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePageResponse'
              example:
                items:
                  - messageId: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                    chatId: "11111111-1111-1111-1111-111111111111"
                    senderId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                    content: "Привет из message-service"
                    createdAt: "2026-05-14T18:30:00Z"
                    updatedAt: null
                    deletedAt: null
                    edited: false
                    deleted: false
                limit: 50
                hasMore: false
                nextBefore: null

        '400':
          description: Некорректные параметры запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequestParameter:
                  summary: Некорректный query-параметр
                  value:
                    code: "INVALID_REQUEST_PARAMETER"
                    message: "Invalid request parameter: chatId"
                    status: 400
                    path: "/messages"
                    timestamp: "2026-05-14T18:30:00Z"
                validationError:
                  summary: Ошибка валидации limit
                  value:
                    code: "VALIDATION_ERROR"
                    message: "getMessagesByChat.limit: must be less than or equal to 100"
                    status: 400
                    path: "/messages"
                    timestamp: "2026-05-14T18:30:00Z"

        '401':
          description: Пользователь не аутентифицирован или JWT некорректен

        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /messages/{messageId}:
    get:
      tags:
        - Messages
      summary: Получить сообщение по идентификатору
      description: |
        Возвращает сообщение по его идентификатору.

        В текущей реализации сервис не проверяет, имеет ли пользователь доступ
        к чату, в котором находится сообщение. Эта проверка будет добавлена позже.
      operationId: getMessageById
      security:
        - bearerAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          description: Идентификатор сообщения
          schema:
            type: string
            format: uuid
          example: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"

      responses:
        '200':
          description: Сообщение успешно найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                messageId: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                chatId: "11111111-1111-1111-1111-111111111111"
                senderId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                content: "Привет из message-service"
                createdAt: "2026-05-14T18:30:00Z"
                updatedAt: null
                deletedAt: null
                edited: false
                deleted: false

        '400':
          description: Некорректный path-параметр messageId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INVALID_REQUEST_PARAMETER"
                message: "Invalid request parameter: messageId"
                status: 400
                path: "/messages/not-a-uuid"
                timestamp: "2026-05-14T18:30:00Z"

        '401':
          description: Пользователь не аутентифицирован или JWT некорректен

        '404':
          description: Сообщение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_NOT_FOUND"
                message: "Message not found: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 404
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Messages
      summary: Редактировать сообщение
      description: |
        Позволяет автору сообщения изменить его содержимое.

        В текущей реализации редактировать можно только собственное сообщение.
        Удалённое сообщение редактировать нельзя.
      operationId: updateMessage
      security:
        - bearerAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          description: Идентификатор сообщения
          schema:
            type: string
            format: uuid
          example: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMessageRequest'
            example:
              content: "Отредактированное сообщение"

      responses:
        '200':
          description: Сообщение успешно обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                messageId: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                chatId: "11111111-1111-1111-1111-111111111111"
                senderId: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
                content: "Отредактированное сообщение"
                createdAt: "2026-05-14T18:30:00Z"
                updatedAt: "2026-05-14T18:35:00Z"
                deletedAt: null
                edited: true
                deleted: false

        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Ошибка валидации тела запроса
                  value:
                    code: "VALIDATION_ERROR"
                    message: "content: must not be blank"
                    status: 400
                    path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                    timestamp: "2026-05-14T18:30:00Z"
                invalidRequestParameter:
                  summary: Некорректный messageId
                  value:
                    code: "INVALID_REQUEST_PARAMETER"
                    message: "Invalid request parameter: messageId"
                    status: 400
                    path: "/messages/not-a-uuid"
                    timestamp: "2026-05-14T18:30:00Z"

        '401':
          description: Пользователь не аутентифицирован или JWT некорректен

        '403':
          description: Пользователь не является автором сообщения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_ACCESS_DENIED"
                message: "Access denied to message: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 403
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '404':
          description: Сообщение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_NOT_FOUND"
                message: "Message not found: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 404
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '409':
          description: Сообщение уже удалено и не может быть отредактировано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_ALREADY_DELETED"
                message: "Message is already deleted: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 409
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Messages
      summary: Удалить сообщение
      description: |
        Выполняет мягкое удаление сообщения.

        Сообщение не удаляется физически из базы данных.
        Вместо этого заполняется поле `deletedAt`.

        В текущей реализации удалить можно только собственное сообщение.
        В будущем будет добавлена проверка права `canDeleteAnyMessages`
        из локальной read-model, синхронизируемой с chat-service через RabbitMQ.
      operationId: deleteMessage
      security:
        - bearerAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          description: Идентификатор сообщения
          schema:
            type: string
            format: uuid
          example: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"

      responses:
        '204':
          description: Сообщение успешно удалено

        '400':
          description: Некорректный path-параметр messageId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INVALID_REQUEST_PARAMETER"
                message: "Invalid request parameter: messageId"
                status: 400
                path: "/messages/not-a-uuid"
                timestamp: "2026-05-14T18:30:00Z"

        '401':
          description: Пользователь не аутентифицирован или JWT некорректен

        '403':
          description: Пользователь не является автором сообщения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_ACCESS_DENIED"
                message: "Access denied to message: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 403
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '404':
          description: Сообщение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_NOT_FOUND"
                message: "Message not found: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 404
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '409':
          description: Сообщение уже удалено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "MESSAGE_ALREADY_DELETED"
                message: "Message is already deleted: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                status: 409
                path: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"
                timestamp: "2026-05-14T18:30:00Z"

        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SendMessageRequest:
      type: object
      required:
        - chatId
        - content
      properties:
        chatId:
          type: string
          format: uuid
          description: Идентификатор чата, в который отправляется сообщение
          example: "11111111-1111-1111-1111-111111111111"
        content:
          type: string
          minLength: 1
          maxLength: 4000
          description: Текст сообщения
          example: "Привет из message-service"

    UpdateMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
          description: Новый текст сообщения
          example: "Отредактированное сообщение"

    MessageResponse:
      type: object
      properties:
        messageId:
          type: string
          format: uuid
          description: Идентификатор сообщения
          example: "9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"

        chatId:
          type: string
          format: uuid
          description: Идентификатор чата
          example: "11111111-1111-1111-1111-111111111111"

        senderId:
          type: string
          format: uuid
          description: Идентификатор отправителя сообщения
          example: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"

        content:
          type: string
          nullable: true
          description: |
            Текст сообщения.

            Если сообщение мягко удалено, сервис возвращает `null`,
            хотя исходный текст остаётся сохранённым в базе данных.
          example: "Привет из message-service"

        createdAt:
          type: string
          format: date-time
          description: Дата и время создания сообщения
          example: "2026-05-14T18:30:00Z"

        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Дата и время последнего редактирования сообщения
          example: null

        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Дата и время мягкого удаления сообщения
          example: null

        edited:
          type: boolean
          description: Было ли сообщение отредактировано
          example: false

        deleted:
          type: boolean
          description: Было ли сообщение мягко удалено
          example: false

    MessagePageResponse:
      type: object
      properties:
        items:
          type: array
          description: Список сообщений
          items:
            $ref: '#/components/schemas/MessageResponse'

        limit:
          type: integer
          description: Максимальное количество сообщений в ответе
          example: 50

        hasMore:
          type: boolean
          description: Есть ли ещё сообщения для загрузки
          example: false

        nextBefore:
          type: string
          format: date-time
          nullable: true
          description: |
            Cursor для получения следующей страницы сообщений.

            Если `hasMore = true`, значение можно передать в query-параметр
            `before` при следующем запросе.
          example: "2026-05-14T18:25:00Z"

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Машиночитаемый код ошибки
          enum:
            - INVALID_MESSAGE
            - MESSAGE_NOT_FOUND
            - MESSAGE_ACCESS_DENIED
            - MESSAGE_ALREADY_DELETED
            - CHAT_NOT_FOUND
            - CHAT_ACCESS_DENIED
            - INVALID_JWT
            - VALIDATION_ERROR
            - INVALID_REQUEST_BODY
            - INVALID_REQUEST_PARAMETER
            - DATA_INTEGRITY_VIOLATION
            - INTERNAL_ERROR
          example: "MESSAGE_NOT_FOUND"

        message:
          type: string
          description: Описание ошибки
          example: "Message not found: 9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"

        status:
          type: integer
          description: HTTP-статус ошибки
          example: 404

        path:
          type: string
          description: Путь запроса, на котором произошла ошибка
          example: "/messages/9b7f1b2c-3d4e-4f5a-8b9c-1d2e3f4a5b6c"

        timestamp:
          type: string
          format: date-time
          description: Время возникновения ошибки
          example: "2026-05-14T18:30:00Z"